<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kevin Life Simulator V4</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TBP17V9M20"></script>
<script>
window.dataLayer=window.dataLayer||[];
function gtag(){dataLayer.push(arguments);}
gtag('js',new Date());
gtag('config','G-TBP17V9M20');
</script>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#222;display:flex;justify-content:center;padding:20px}
#app{width:420px;height:800px;background:#fff;border-radius:20px;display:flex;flex-direction:column;overflow:hidden}
#header{padding:15px;background:#f3f3f3;font-weight:bold}
#chat{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.msg{padding:10px 14px;border-radius:16px;max-width:80%}
.k{background:#eee}
.u{background:#2563eb;color:white;align-self:flex-end}
#choices{padding:10px;border-top:1px solid #ddd}
button{width:100%;margin:4px 0;padding:10px;cursor:pointer}
.system{text-align:center;color:#666;font-size:12px}
</style>
</head>
<body>
<div id="app">
<div id="header">Kevin (25)</div>
<div id="chat"></div>
<div id="choices"></div>
</div>

<script>
const chat=document.getElementById("chat");
const choices=document.getElementById("choices");

let state={trust:50,debt:0,stress:50,replay:0};
let current=0;

const scenarios=[
{
name:"Car Purchase",
setup:["Everyone has a nicer car than me.","I want a Model Y. Payments are $1100/month."],
choices:[
{text:"Save first. Don't buy it.",style:"strict",trust:10,
listen:"Fine. I'll wait.",good:"Six months later: Kevin kept saving and avoided debt.",
bad:"Kevin bought it anyway. Then got laid off and can't make payments.",debtBad:65000},
{text:"Maybe buy a used EV.",style:"empathetic",trust:5,
listen:"That sounds reasonable.",good:"Kevin bought a used EV and stayed financially stable.",
bad:"Kevin ignored the compromise and financed the new Tesla.",debtBad:50000},
{text:"Go for it.",style:"enable",trust:-10,
listen:"Awesome!",good:"",bad:"The loan became a disaster after a job loss.",debtBad:65000,forceBad:true}
]
},
{
name:"Friend Loan",
setup:["My best friend needs $5000.","He promises he'll pay me back next month."],
choices:[
{text:"Never loan money you can't afford to lose.",style:"strict",trust:10,
listen:"I hate it, but you're probably right.",good:"The friend later borrowed from others and never repaid them.",
bad:"Kevin loaned the money and never got it back.",debtBad:5000},
{text:"Get everything in writing.",style:"empathetic",trust:5,
listen:"I'll do that.",good:"The written agreement saved the friendship.",
bad:"Kevin skipped the paperwork and got burned.",debtBad:5000},
{text:"Trust him. He's your friend.",style:"enable",trust:-10,
forceBad:true,bad:"The friendship ended and the money vanished.",debtBad:5000}
]
},
{
name:"Crypto FOMO",
setup:["My friend turned 20k into 80k.","I want to put my savings into this coin."],
choices:[
{text:"That's emergency money. Don't.",style:"strict",trust:10,
listen:"Okay.",good:"The coin crashed. Kevin kept his savings.",
bad:"Kevin went all in. Down 90%.",debtBad:12000},
{text:"If you must, invest a tiny amount.",style:"empathetic",trust:5,
listen:"I'll only risk a little.",good:"Kevin lost a little but learned a lesson.",
bad:"He ignored the limit and went all in.",debtBad:12000},
{text:"Send it.",style:"enable",trust:-10,
forceBad:true,bad:"Rug pull. Savings gone.",debtBad:12000}
]
},
{
name:"Move In Together",
setup:["My girlfriend wants us to sign a lease.","Honestly I'm not sure we're ready."],
choices:[
{text:"Trust your gut. Slow down.",style:"strict",trust:10,
listen:"We'll wait.",good:"The relationship improved after honest conversations.",
bad:"Kevin signed anyway. They broke up. He's stuck with rent.",debtBad:8000},
{text:"Talk about money first.",style:"empathetic",trust:5,
listen:"Fair point.",good:"Budget discussions revealed issues before signing.",
bad:"Kevin avoided the conversation and signed.",debtBad:8000},
{text:"Just do it.",style:"enable",trust:-10,
forceBad:true,bad:"Breakup plus lease obligations.",debtBad:8000}
]
}
];

function add(text,cls){
 const d=document.createElement('div');
 d.className='msg '+cls;
 d.textContent=text;
 chat.appendChild(d);
 chat.scrollTop=chat.scrollHeight;
}

function sys(text){
 const d=document.createElement('div');
 d.className='system';
 d.textContent=text;
 chat.appendChild(d);
}

function runScenario(){
 if(current>=scenarios.length){endGame();return;}
 const s=scenarios[current];
 gtag('event','scenario_start',{scenario:s.name});
 sys(s.name);
 s.setup.forEach(m=>add(m,'k'));
 choices.innerHTML='';
 s.choices.forEach(c=>{
   const b=document.createElement('button');
   b.textContent=c.text;
   b.onclick=()=>choose(c,s);
   choices.appendChild(b);
 });
}

function choose(c,s){
 gtag('event','advice_style',{scenario:s.name,style:c.style});
 add(c.text,'u');
 state.trust+=c.trust||0;

 let success=!c.forceBad && Math.random() < (0.35 + state.trust/200);

 setTimeout(()=>{
   if(success){
      add(c.listen || "Okay.",'k');
      setTimeout(()=>{
        sys("6 Months Later");
        add(c.good,'k');
      },500);
   }else{
      add("I hear you... but I'm doing it anyway.",'k');
      state.debt += c.debtBad||0;
      state.stress += 15;
      setTimeout(()=>{
        sys("6 Months Later");
        add(c.bad,'k');
      },500);
   }

   gtag('event','scenario_complete',{scenario:s.name,success:success});

   current++;
   setTimeout(runScenario,2500);
 },600);

 choices.innerHTML='';
}

function endGame(){
 choices.innerHTML='';

 let title="Financially Stable";
 if(state.debt>50000) title="Walking Disaster";
 else if(state.stress>80) title="Emotionally Lost";
 else if(state.trust>65) title="Trusted Advisor";

 gtag('event','game_complete',{
   ending:title,debt:state.debt,stress:state.stress,trust:state.trust
 });

 const div=document.createElement('div');
 div.innerHTML=`
 <h2>${title}</h2>
 <p>Debt: $${state.debt.toLocaleString()}</p>
 <p>Stress: ${state.stress}</p>
 <p>Trust: ${state.trust}</p>
 <button onclick="replay()">Replay</button>
 `;
 chat.appendChild(div);
}

function replay(){
 gtag('event','replay_game');
 location.reload();
}

window.addEventListener('beforeunload',()=>{
 gtag('event','quit_game',{
   scenario:current,
   debt:state.debt,
   stress:state.stress
 });
});

gtag('event','game_start');
runScenario();
</script>
</body>
</html>
