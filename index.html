<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin Life Simulator v4.0</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX'); // REPLACE WITH YOUR GA4 ID
    </script>

    <style>
        :root {
            --bg-color: #f3f4f6;
            --chat-bg: #ffffff;
            --user-bubble: #007aff; /* iMessage Blue */
            --kevin-bubble: #e5e5ea; /* iMessage Grey */
            --text-dark: #1f2937;
            --text-light: #ffffff;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-dark); display: flex; justify-content: center; height: 100vh; }
        
        #app-container {
            width: 100%; max-width: 480px; background: var(--chat-bg); display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Stats Bar */
        #stats-bar {
            padding: 15px; background: #f8fafc; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-weight: 600; font-size: 14px;
        }

        /* Chat Window */
        #chat-window {
            flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background-color: #ffffff;
        }

        .message { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; animation: fadeIn 0.3s ease-in; }
        
        .kevin-msg { background-color: var(--kevin-bubble); color: #000; align-self: flex-start; border-bottom-left-radius: 4px; }
        .user-msg { background-color: var(--user-bubble); color: var(--text-light); align-self: flex-end; border-bottom-right-radius: 4px; }
        .system-msg { align-self: center; background-color: transparent; color: #6b7280; font-size: 12px; font-style: italic; max-width: 100%; text-align: center; }

        /* Choices Area */
        #choices-container {
            padding: 15px; background: #ffffff; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px;
        }

        .choice-btn {
            background-color: #ffffff; border: 1px solid #d1d5db; color: var(--text-dark); padding: 14px; border-radius: 12px; font-size: 15px; cursor: pointer; text-align: left; transition: all 0.2s;
        }
        
        /* Removed color hints entirely. Buttons just turn light grey on hover to indicate they are clickable. */
        .choice-btn:hover { background-color: #f3f4f6; border-color: #9ca3af; }

        #intro-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; z-index: 10;
        }

        .start-btn, .replay-btn {
            margin-top: 20px; background: var(--user-bubble); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app-container">
    <div id="intro-modal">
        <h2>Kevin is 25.</h2>
        <p style="margin-top: 15px; color: #4b5563; line-height: 1.5;">He makes decent money, but he is constantly one choice away from a disaster.<br><br>He's about to make some major financial decisions. <strong>How they turn out depends entirely on you.</strong></p>
        <button class="start-btn" onclick="startGame()">Start Giving Advice</button>
    </div>

    <div id="stats-bar" style="display: none;">
        <span id="debt-display">💸 Debt: $0</span>
        <span id="stress-display">😰 Stress: 0/100</span>
    </div>

    <div id="chat-window"></div>
    <div id="choices-container"></div>
</div>

<script>
    // Game State
    let state = {
        debt: 0,
        stress: 20,
        trust: 0, 
        currentScenario: 0,
        cryptoLost: false // Cross-scenario memory
    };

    const chatWindow = document.getElementById('chat-window');
    const choicesContainer = document.getElementById('choices-container');

    // SCENARIOS DEFINITION (v4.0 The Reality Check)
    const scenarios = [
        {
            // Scenario 1: The Car
            setup: "Just test drove a 2026 Tacoma. Dealership offered 72 months, payments are actually totally doable. Pulling the trigger today.",
            choices: [
                {
                    text: "72 months is insane. You'll be underwater immediately on a depreciating asset.",
                    type: "strict",
                    pushback: "Bro, literally everyone finances for 6 years now. It's the only way to afford anything decent.",
                    baseListenChance: 0.2
                },
                {
                    text: "You work hard, but don't trap yourself with that monthly payment. Think about your cash flow.",
                    type: "empathetic",
                    pushback: "I do work hard, exactly. I put in 50 hours a week, I deserve a car that isn't falling apart.",
                    baseListenChance: 0.3
                },
                {
                    text: "Do whatever you want man. It's your money.",
                    type: "give_up",
                    pushback: "Yeah, exactly. I'm signing.",
                    baseListenChance: 0.0
                }
            ],
            consequence: {
                ignored: { debt: 45000, stress: 30, text: "Kevin signed the 72-month loan at 9% interest." },
                listened: { debt: 0, stress: 0, trust: 10, text: "Kevin walked away from the dealership. He bought a used Honda instead." }
            }
        },
        {
            // Scenario 2: Crypto
            setup: "My buddy Jack just made $40K on some alt-coin presale. He sent me the private Discord link. I'm transferring my savings in now.",
            choices: [
                {
                    text: "That is literally the definition of a pump and dump scam. Do not do this.",
                    type: "strict",
                    pushback: "You guys just like watching your money rot in a savings account at 4%. This is how real wealth is made.",
                    baseListenChance: 0.15 
                },
                {
                    text: "I know it's tempting seeing Jack win, but this is gambling, not investing. Please don't risk your savings.",
                    type: "empathetic",
                    pushback: "It's calculated risk. If I don't take a swing now, I'm gonna be working in a cubicle until I'm 70.",
                    baseListenChance: 0.25
                },
                {
                    text: "Good luck. Hope you don't lose it all.",
                    type: "give_up",
                    pushback: "I won't. Watch me.",
                    baseListenChance: 0.0
                }
            ],
            consequence: {
                ignored: { debt: 15000, stress: 40, cryptoLossFlag: true, text: "The coin rug-pulled. Kevin lost his entire savings and took out a personal loan to cover rent." },
                listened: { debt: 0, stress: 0, trust: 15, text: "Kevin didn't invest. The coin crashed 98% two days later. He realizes you saved him." }
            }
        },
        {
            // Scenario 3: The Career/TikTok (Dynamic based on memory)
            getSetup: () => {
                if (state.cryptoLost) {
                    return "Look, I know the crypto thing was a massive disaster. But this is different. My video just hit 50K views. I'm quitting my job on Friday to do TikTok full-time.";
                } else {
                    return "My video just hit 50K views. I'm putting my two weeks in on Friday to do TikTok full-time. The corporate grind is dead.";
                }
            },
            choices: [
                {
                    text: "You cannot pay rent with 50K views. You have no business plan and no emergency fund.",
                    type: "strict",
                    pushback: "You just don't get the creator economy. Brands are already reaching out. If I don't jump now, I miss the wave.",
                    baseListenChance: 0.2
                },
                {
                    text: "That's awesome about the views! But do both for now. Don't quit until TikTok replaces your actual salary.",
                    type: "empathetic",
                    pushback: "I can't scale it if I'm stuck at a desk 8 hours a day. You have to burn the boats to succeed.",
                    baseListenChance: 0.3
                },
                {
                    text: "Sure, go be an influencer. Have fun.",
                    type: "give_up",
                    pushback: "Thanks for the overwhelming support. 🙄 Putting in my notice.",
                    baseListenChance: 0.0
                }
            ],
            consequence: {
                ignored: { debt: 20000, stress: 50, text: "Kevin quit. The algorithm changed, his views tanked, and he lived on credit cards for 6 months." },
                listened: { debt: 0, stress: -10, trust: 20, text: "Kevin kept his job and did YouTube on weekends. He got a promotion at work." }
            }
        }
    ];

    function startGame() {
        document.getElementById('intro-modal').style.display = 'none';
        document.getElementById('stats-bar').style.display = 'flex';
        gtag('event', 'game_start');
        loadScenario();
    }

    function updateUI() {
        // Cap stress at 100 for the UI display
        let displayStress = state.stress > 100 ? 100 : state.stress;
        document.getElementById('debt-display').innerText = `💸 Debt: $${state.debt.toLocaleString()}`;
        document.getElementById('stress-display').innerText = `😰 Stress: ${displayStress}/100`;
    }

    function addMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}-msg`;
        msgDiv.innerText = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function loadScenario() {
        choicesContainer.innerHTML = '';
        if (state.currentScenario >= scenarios.length) {
            endGame();
            return;
        }

        const scenario = scenarios[state.currentScenario];
        gtag('event', 'scenario_reached', { scenario_index: state.currentScenario });
        
        // Handle dynamic setup for Scenario 3 memory
        let setupText = scenario.setup ? scenario.setup : scenario.getSetup();
        
        setTimeout(() => {
            addMessage(setupText, 'kevin');
            renderChoices(scenario);
        }, 800);
    }

    function renderChoices(scenario) {
        scenario.choices.forEach((choice, index) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = choice.text;
            btn.onclick = () => handleChoice(choice, scenario);
            choicesContainer.appendChild(btn);
        });
    }

    function handleChoice(choice, scenario) {
        gtag('event', 'attempted_intervention', { intervention_type: choice.type });
        choicesContainer.innerHTML = '';
        addMessage(choice.text, 'user');

        if (choice.type === "give_up") {
            setTimeout(() => {
                addMessage(choice.pushback, 'kevin');
                applyConsequences(scenario.consequence.ignored);
            }, 1000);
            return;
        }

        // The Pushback Phase
        setTimeout(() => {
            addMessage(choice.pushback, 'kevin');
            
            // Final Warning Button
            setTimeout(() => {
                const finalBtn = document.createElement('button');
                finalBtn.className = 'choice-btn';
                finalBtn.innerText = "Look, just trust me on this. Please.";
                finalBtn.onclick = () => resolveScenario(choice, scenario);
                choicesContainer.appendChild(finalBtn);
            }, 800);
        }, 1200);
    }

    function resolveScenario(choice, scenario) {
        choicesContainer.innerHTML = '';
        addMessage("Look, just trust me on this. Please.", 'user');

        // Logic Check: Did he listen? (Much harder now)
        let totalChance = choice.baseListenChance + (state.trust * 0.01);
        let roll = Math.random();
        
        let listened = roll < totalChance;

        setTimeout(() => {
            if (listened) {
                gtag('event', 'kevin_listened');
                addMessage("...fine. Whatever. I'll hold off.", 'kevin');
                applyConsequences(scenario.consequence.listened);
            } else {
                gtag('event', 'kevin_rejected_advice');
                addMessage("I hear you, but you're wrong. I'm doing it.", 'kevin');
                applyConsequences(scenario.consequence.ignored);
            }
        }, 1500);
    }

    function applyConsequences(result) {
        setTimeout(() => {
            state.debt += result.debt;
            state.stress += result.stress;
            if (result.trust) state.trust += result.trust;
            if (result.cryptoLossFlag) state.cryptoLost = true; // Set memory flag
            
            updateUI();
            addMessage(`* ${result.text} *`, 'system');
            
            state.currentScenario++;
            setTimeout(loadScenario, 2500);
        }, 1500);
    }

    function endGame() {
        gtag('event', 'ending_reached', { final_debt: state.debt, final_stress: state.stress });
        choicesContainer.innerHTML = '';
        
        setTimeout(() => {
            if (state.debt === 0) {
                addMessage("Okay... honestly, thank you. If you hadn't stopped me, I would have ruined my life. I owe you.", 'kevin');
            } else {
                // The Guilt Trip Ending to drive Rage Replays
                addMessage("You were right, okay? Are you happy now? I have massive debt, my credit is ruined, and I have to move back in with my parents. I wish you had tried harder to stop me. Don't text me.", 'kevin');
            }
            
            setTimeout(() => {
                const replayBtn = document.createElement('button');
                replayBtn.className = 'replay-btn';
                replayBtn.innerText = "Try to Save Him Again";
                replayBtn.onclick = () => {
                    gtag('event', 'rage_replay');
                    location.reload();
                };
                choicesContainer.appendChild(replayBtn);
            }, 1000);
        }, 1000);
    }
</script>
</body>
</html>
