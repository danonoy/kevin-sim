<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin Life Simulator v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TBP17V9M20"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TBP17V9M20');
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #111827; }
        ::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat-bubble-u { background-color: #3b82f6; color: #ffffff; border-bottom-right-radius: 4px; }
        .system-bubble { background: transparent; border: 1px solid #e5e7eb; border-radius: 4px; color: #6b7280; font-size: 0.75rem; text-align: center; padding: 6px 12px; margin: 0 auto; text-transform: uppercase; letter-spacing: 0.05em;}
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        #chat-box { transition: background-color 0.8s ease-in-out; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen py-4 sm:py-8">

    <div class="w-full max-w-sm h-[800px] max-h-screen bg-white shadow-2xl relative flex flex-col sm:rounded-[2.5rem] border-[8px] border-gray-900 overflow-hidden">
        
        <div class="bg-gray-100/90 backdrop-blur-sm border-b border-gray-200 px-4 py-3 flex items-center gap-3 z-10 shrink-0">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-gray-700 to-gray-900 flex items-center justify-center text-white font-bold text-lg shadow-inner">K</div>
            <div>
                <h2 class="font-bold text-gray-800 leading-tight">Kevin</h2>
                <p class="text-xs text-green-600 font-bold">Online</p>
            </div>
        </div>

        <div id="chat-box" class="flex-1 p-4 overflow-y-auto flex flex-col gap-4 bg-slate-50">
            </div>

        <div id="choice-panel" class="bg-white border-t border-gray-200 p-3 hidden slide-up shadow-[0_-4px_15px_rgba(0,0,0,0.05)] z-20 shrink-0">
            <p class="text-[10px] font-bold text-gray-400 text-center uppercase tracking-widest mb-2" id="choice-header">Give Advice</p>
            <div id="choices-container" class="space-y-2 max-h-[35vh] overflow-y-auto pb-1">
                </div>
        </div>

        <div id="time-jump" class="absolute inset-0 bg-slate-900/95 z-30 flex flex-col items-center justify-center hidden fade-in text-white">
            <p class="text-gray-400 text-sm mb-2" id="jump-subtitle">3 Months Later...</p>
            <h2 class="text-2xl font-black tracking-widest text-center px-4" id="jump-title">Life is Good</h2>
        </div>

    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const choicePanel = document.getElementById('choice-panel');
        const choicesContainer = document.getElementById('choices-container');
        const choiceHeader = document.getElementById('choice-header');
        const timeJump = document.getElementById('time-jump');
        
        let stats = { trust: 50, stress: 50, debt: 0 };
        let currentStage = 0;
        let scenarioStartTime = 0; 
        let currentEndingType = ''; 

        // Smart Branching Story Logic
        const storyEvents = [
            {
                scenarioName: "The Car (Status Anxiety)",
                setup: [
                    "Dude, I'm seriously thinking about getting a Model Y 😅",
                    "Payments would be like $1,100 a month. I make $3,800, so... that's fine, right?",
                    "Went to my buddy's birthday last weekend and THREE people pulled up in new cars. I showed up in my 2015 Corolla and wanted to die 😩"
                ],
                choices: [
                    { 
                        text: "That's a terrible idea right now. Save up a real down payment first.", 
                        tone: "rational",
                        leadsToPushback: true,
                        immediateReply: "You always just lecture me. You don't understand what it feels like to be looked down on. I can make it work 😤",
                        replyMood: "argue",
                        followup_choices: [
                            { text: "$1,100 x 72 months. You have $8K saved. Do the math, Kevin.", debtEffect: 0, stressEffect: -10, isStrict: true },
                            { text: "Real friends aren't gonna respect you more because of a car.", debtEffect: 0, stressEffect: -10, isStrict: true },
                            { text: "Alright, fine. Your call. Treat yourself.", debtEffect: 65000, stressEffect: 30, isStrict: false }
                        ]
                    },
                    { 
                        text: "You only live once! Do it. You gotta look the part to get the part.", 
                        tone: "enabling",
                        leadsToPushback: false,
                        immediateReply: "Haha I knew you'd get it! I'm signing the papers today. Sick! 😎",
                        replyMood: "agree",
                        debtEffect: 65000, stressEffect: 20,
                        consequence: "Kevin bought the car. Third month in, his company does layoffs. He texts you: \"Bro I can't sleep. I've got 69 months left on the loan and they're threatening to repo it. I'm so cooked.\"",
                        consequenceMood: "upset"
                    }
                ],
                listenMsg: "...Okay yeah, when you put it that way, $1,100 plus insurance is basically 40% of my take-home. I'm gonna hold off. 😮",
                resistMsg: "Nah, I already went back to test drive it again. It felt amazing. I'm doing it 😤",
                jumpTitle: "The Reality Check",
                jumpSub: "6 Months Later",
                outcomeListened: "Kevin didn't buy the car. He texts you: \"Hey, remember when you talked me out of the Model Y? My coworker just bought one and he literally can't afford lunch now. Thanks for that.\"",
                outcomeIgnored: "Kevin bought the car. Third month in, his company does layoffs. He texts you: \"Bro I can't sleep. I've got 69 months left on the loan and they're threatening to repo it. I'm so cooked.\""
            },
            {
                scenarioName: "Crypto FOMO",
                setup: [
                    "Okay so my buddy Jack just turned $20K into $80K in like 6 weeks on this one coin 👀",
                    "He's telling me I need to get in NOW, before it explodes even more.",
                    "I only have my savings but honestly... this feels like a once-in-a-lifetime thing, you know?"
                ],
                choices: [
                    { 
                        text: "That money is your emergency fund. You don't gamble with it. 5% max.", 
                        tone: "rational",
                        leadsToPushback: true,
                        immediateReply: "But he LITERALLY made $60K. That's real money. Am I just supposed to sit here and watch? I don't wanna be the guy who missed out 😤",
                        replyMood: "argue",
                        followup_choices: [
                            { text: "'Guaranteed returns' and 'closes soon' are textbook scam red flags.", debtEffect: 0, stressEffect: -5, isStrict: true },
                            { text: "You only see the wins. For every guy who got rich, ten people lost everything.", debtEffect: 0, stressEffect: -5, isStrict: true },
                            { text: "Okay fine, put in a little. Like $1,000 max.", debtEffect: 8000, stressEffect: 20, isStrict: false }
                        ]
                    },
                    { 
                        text: "Jack made money, so it could work. Scared money makes no money. Go for it.", 
                        tone: "enabling",
                        leadsToPushback: false,
                        immediateReply: "Exactly! You miss 100% of the shots you don't take. I'm wiring my savings over right now. 🚀",
                        replyMood: "agree",
                        debtEffect: 12000, stressEffect: 30,
                        consequence: "The coin flash-crashed. Kevin texts: \"My portfolio is down 90%. The founders pulled the liquidity. I maxed my card for this and now I can't pay rent next month.\"",
                        consequenceMood: "upset"
                    }
                ],
                listenMsg: "I looked it up. The website is three months old and my buddy's been weirdly pushy about it. I think I almost got got. Thanks for talking me down 😅",
                resistMsg: "You're too scared of everything. I'm not missing this. I put half my savings in and maxed a credit card to buy the dip. Feeling good about this one 😏",
                jumpTitle: "The Market Crash",
                jumpSub: "2 Months Later",
                outcomeListened: "The coin collapsed. Kevin texts: \"That thing went to zero. Jack lost $60K. I can't believe I almost threw my whole savings in there. You literally saved me.\"",
                outcomeIgnored: "The coin flash-crashed. Kevin texts: \"My portfolio is down 90%. The founders pulled the liquidity. I maxed my card for this and now I can't pay rent next month.\""
            },
            {
                scenarioName: "The Lease Trap",
                setup: [
                    "So my girlfriend wants to move in together. We've been together three years 😶",
                    "I love her, but honestly? I'm not sure I'm ready. Something feels off.",
                    "She basically said if I'm not ready after 3 years, maybe I don't actually see a future with her..."
                ],
                choices: [
                    { 
                        text: "Your gut feeling matters. 'Not sure' is valid — talk to her about what's actually making you hesitate.", 
                        tone: "rational",
                        leadsToPushback: true,
                        immediateReply: "Her friends are telling her if a guy won't move in after 3 years, he's not serious. I don't want to lose her over this 😔",
                        replyMood: "argue",
                        followup_choices: [
                            { text: "Using pressure to force a decision isn't love. A good relationship can handle an honest conversation.", debtEffect: 0, stressEffect: -10, isStrict: true },
                            { text: "Have you actually told her what's making you hesitate? She might not even know.", debtEffect: 0, stressEffect: -10, isStrict: true },
                            { text: "Just go with it. It's been 3 years, it'll probably be fine.", debtEffect: 8000, stressEffect: 20, isStrict: false }
                        ]
                    },
                    { 
                        text: "She's been waiting three years. If you don't do it now, you'll lose her. Just do it.", 
                        tone: "enabling",
                        leadsToPushback: false,
                        immediateReply: "You're right, I'm just overthinking it. We're gonna go sign a 12-month lease today. Wish me luck! 🏠",
                        replyMood: "agree",
                        debtEffect: 8000, stressEffect: 35,
                        consequence: "Kevin texts: \"We broke up. Turns out we had problems we never dealt with. But we signed a 12-month lease, she moved out, and I'm stuck paying $3,200 rent alone. I'm drowning.\"",
                        consequenceMood: "upset"
                    }
                ],
                listenMsg: "I sat her down and told her what was bothering me. She was upset at first, but she had no idea I felt that way. We decided to wait six months and talk properly. Feels way better.",
                resistMsg: "I don't want to overcomplicate it. She moves in next month 🙂 It'll be fine I think.",
                jumpTitle: "The Breaking Point",
                jumpSub: "8 Months Later",
                outcomeListened: "Kevin texts: \"We moved in together last month — but this time because we both actually wanted to. Completely different energy. Thanks for telling me to slow down.\"",
                outcomeIgnored: "Kevin texts: \"We broke up. Turns out we had problems we never dealt with. But we signed a 12-month lease, she moved out, and I'm stuck paying $3,200 rent alone. I'm drowning.\""
            }
        ];

        function scrollToBottom() {
            setTimeout(() => {
                chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        function setChatMood(mood) {
            chatBox.classList.remove('bg-slate-50', 'bg-red-50', 'bg-green-50', 'bg-slate-200');
            if (mood === 'argue') chatBox.classList.add('bg-red-50');
            else if (mood === 'agree') chatBox.classList.add('bg-green-50');
            else if (mood === 'upset') chatBox.classList.add('bg-slate-200');
            else chatBox.classList.add('bg-slate-50'); 
        }

        function getBubbleStyle(mood) {
            if (mood === 'argue') return 'bg-red-100 text-red-900 border border-red-200 font-medium';
            if (mood === 'agree') return 'bg-green-100 text-green-900 border border-green-200';
            if (mood === 'upset') return 'bg-gray-300 text-gray-800 border border-gray-400 italic';
            return 'bg-gray-100 text-gray-800 border border-gray-200'; 
        }

        function showTyping(callback) {
            const id = 'typing-' + Date.now();
            chatBox.insertAdjacentHTML('beforeend', `
                <div id="${id}" class="flex gap-2 w-max max-w-[75%] px-4 py-3 rounded-2xl bg-gray-100 border border-gray-200 slide-up items-center rounded-bl-sm">
                    <div class="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-gray-500 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-gray-500 rounded-full typing-dot"></div>
                </div>
            `);
            scrollToBottom();
            setTimeout(() => {
                const el = document.getElementById(id);
                if(el) el.remove();
                callback();
            }, 1200);
        }

        function addKevinMessage(text, isSystem = false, mood = 'neutral') {
            if (isSystem) {
                chatBox.insertAdjacentHTML('beforeend', `<div class="system-bubble slide-up my-2">${text}</div>`);
            } else {
                setChatMood(mood);
                const bubbleStyle = getBubbleStyle(mood);
                chatBox.insertAdjacentHTML('beforeend', `
                    <div class="flex gap-2 w-max max-w-[85%] px-4 py-3 rounded-2xl ${bubbleStyle} slide-up text-[15px] leading-relaxed shadow-sm rounded-bl-sm">
                        ${text}
                    </div>
                `);
            }
            scrollToBottom();
        }

        function addUserMessage(text) {
            chatBox.insertAdjacentHTML('beforeend', `
                <div class="flex gap-2 w-max max-w-[85%] px-4 py-3 rounded-2xl chat-bubble-u slide-up text-[15px] leading-relaxed shadow-sm self-end rounded-br-sm">
                    ${text}
                </div>
            `);
            scrollToBottom();
        }

        function sendMessageSequence(messages, mood = 'neutral', callback) {
            let i = 0;
            function sendNext() {
                if (i < messages.length) {
                    showTyping(() => {
                        addKevinMessage(messages[i], false, mood);
                        i++;
                        setTimeout(sendNext, 800); 
                    });
                } else {
                    if (callback) callback();
                }
            }
            sendNext();
        }

        function promptChoices(stage, isFollowup = false) {
            choicesContainer.innerHTML = '';
            const event = storyEvents[stage];
            const options = isFollowup ? event.followup_choices : event.choices;
            
            choiceHeader.innerText = isFollowup ? "Kevin is pushing back. Your response:" : "Give Advice";

            options.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'w-full bg-white hover:bg-gray-50 text-gray-800 font-medium py-3.5 px-4 rounded-xl border border-gray-200 text-left text-[14px] leading-snug transition shadow-sm';
                btn.innerText = choice.text;
                btn.onclick = () => handleChoice(choice, event, isFollowup);
                choicesContainer.appendChild(btn);
            });
            
            choicePanel.classList.remove('hidden');
            scrollToBottom(); 
            
            if (!isFollowup) scenarioStartTime = Date.now();
        }

        function handleChoice(choice, event, isFollowup) {
            choicePanel.classList.add('hidden');
            addUserMessage(choice.text);
            
            if (!isFollowup) {
                gtag('event', 'choice_made', {
                    'event_category': 'Decision',
                    'scenario_name': event.scenarioName,
                    'choice_text': choice.text,
                    'thinking_time_sec': Math.round((Date.now() - scenarioStartTime) / 1000)
                });
                
                if (choice.tone === 'rational') stats.trust += 5;
                if (choice.tone === 'enabling') stats.trust -= 10;

                setTimeout(() => {
                    showTyping(() => {
                        addKevinMessage(choice.immediateReply, false, choice.replyMood);
                        
                        if (choice.leadsToPushback) {
                            // Phase 2: Pushback
                            setTimeout(() => promptChoices(currentStage, true), 1000);
                        } else {
                            // Skipped Pushback (Enabling path) -> Straight to consequence
                            stats.debt += choice.debtEffect;
                            stats.stress += choice.stressEffect;
                            setTimeout(() => {
                                triggerTimeJump(event.jumpTitle, event.jumpSub, choice.consequence, choice.consequenceMood);
                            }, 2500);
                        }
                    });
                }, 600);

            } else {
                // Phase 2: Final decision
                gtag('event', 'followup_choice_made', {
                    'event_category': 'Decision',
                    'scenario_name': event.scenarioName,
                    'is_strict': choice.isStrict
                });

                stats.debt += choice.debtEffect;
                stats.stress += choice.stressEffect;

                let listened = false;
                if (choice.isStrict) {
                    listened = (Math.random() * 100) < stats.trust + 20; 
                }

                const finalReply = listened ? event.listenMsg : event.resistMsg;
                const replyMood = listened ? 'agree' : 'argue';

                setTimeout(() => {
                    showTyping(() => {
                        addKevinMessage(finalReply, false, replyMood);
                        
                        setTimeout(() => {
                            let consequenceMood = listened ? 'agree' : 'upset';
                            triggerTimeJump(event.jumpTitle, event.jumpSub, listened ? event.outcomeListened : event.outcomeIgnored, consequenceMood);
                        }, 2500);
                    });
                }, 800);
            }
        }

        function triggerTimeJump(title, subtitle, consequenceText, consequenceMood) {
            document.getElementById('jump-title').innerText = title;
            document.getElementById('jump-subtitle').innerText = subtitle;
            timeJump.classList.remove('hidden');
            
            setTimeout(() => {
                timeJump.classList.add('hidden');
                setTimeout(() => {
                    addKevinMessage(consequenceText, false, consequenceMood); 
                    
                    setTimeout(() => {
                        currentStage++;
                        if(currentStage < storyEvents.length) {
                            runStage();
                        } else {
                            triggerEndingDialogue();
                        }
                    }, 3500);
                }, 1000);
            }, 3000);
        }

        function runStage() {
            gtag('event', 'scenario_reached', {
                'event_category': 'Progress',
                'scenario_name': storyEvents[currentStage].scenarioName
            });

            setTimeout(() => {
                sendMessageSequence(storyEvents[currentStage].setup, 'neutral', () => {
                    setTimeout(() => promptChoices(currentStage, false), 500);
                });
            }, 1000);
        }

        function triggerEndingDialogue() {
            setTimeout(() => {
                let endingMsg = [];
                let finalMood = 'neutral';

                if (stats.debt > 25000 || stats.stress > 65) {
                    currentEndingType = 'ending_crashed';
                    finalMood = 'upset'; 
                    endingMsg = [
                        "Hey man, are you there?",
                        "I am completely drowning.",
                        "Everything piled up way faster than I thought. The debt, the bills... I can barely pay the minimums.",
                        "My credit score is wrecked and I'm totally burnt out. I don't know what to do..."
                    ];
                } else if (stats.trust > 55) {
                    currentEndingType = 'ending_saved';
                    finalMood = 'agree'; 
                    endingMsg = [
                        "Hey!",
                        "Crazy year. A lot of my friends ended up in massive debt or terrible situations.",
                        "Honestly, thank God I listened to some of your warnings and slowed down.",
                        "I might not have everything figured out, but I can sleep peacefully at night."
                    ];
                } else {
                    currentEndingType = 'ending_struggling';
                    finalMood = 'upset'; 
                    endingMsg = [
                        "Hey...",
                        "Things got really tight this month.",
                        "Between the payments and high cost of living, I have zero savings left.",
                        "I'm constantly stressed out. Feels like I'm one mistake away from ruin."
                    ];
                }

                sendMessageSequence(endingMsg, finalMood, () => {
                    setTimeout(() => {
                        endGame();
                    }, 2000);
                });
            }, 1500);
        }

        function endGame() {
            choicePanel.classList.add('hidden');
            choicesContainer.innerHTML = '';

            let endingHtml = '';

            if (currentEndingType === 'ending_crashed') {
                endingHtml = `
                    <div class="text-center space-y-4">
                        <div class="text-6xl mb-4">💀</div>
                        <div class="text-2xl font-black text-gray-800 tracking-tight">Kevin Crashed.</div>
                        <div class="text-gray-500 text-sm leading-relaxed">
                            He completely ran out of cash flow.<br>He has zero financial resilience left.<br>And he's ghosting everyone's texts.
                        </div>
                    </div>
                `;
            } else if (currentEndingType === 'ending_saved') {
                endingHtml = `
                    <div class="text-center space-y-4">
                        <div class="text-6xl mb-4">🛟</div>
                        <div class="text-2xl font-black text-gray-800 tracking-tight">You Saved Him.</div>
                        <div class="text-gray-500 text-sm leading-relaxed">
                            Kevin still has impulsive urges.<br>But he officially trusts you enough to ask for advice before making big life moves.
                        </div>
                    </div>
                `;
            } else {
                endingHtml = `
                    <div class="text-center space-y-4">
                        <div class="text-6xl mb-4">😶</div>
                        <div class="text-2xl font-black text-gray-800 tracking-tight">Kevin is Surviving.</div>
                        <div class="text-gray-500 text-sm leading-relaxed">
                            His life isn't totally destroyed,<br>but he's living paycheck to paycheck and hasn't truly grown up yet.
                        </div>
                    </div>
                `;
            }

            gtag('event', currentEndingType, {
                'event_category': 'Completion',
                'final_debt': stats.debt,
                'final_stress': stats.stress,
                'final_trust': stats.trust
            });

            const result = document.createElement('div');
            result.className = 'bg-white rounded-3xl p-6 slide-up shadow-xl mt-4 mb-6 border border-gray-100 mx-2 relative z-40';
            
            const formattedDebt = new Intl.NumberFormat('en-US').format(stats.debt);

            result.innerHTML = `
                ${endingHtml}
                <div class="mt-8 bg-gray-50 rounded-2xl p-4 text-[13px] space-y-3 font-medium text-gray-600 border border-gray-100">
                    <div class="flex justify-between items-center">
                        <span>💸 Final Debt</span>
                        <span class="text-red-500 font-bold text-base">$${formattedDebt}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span>😵 Stress Level</span>
                        <span class="text-gray-800 font-bold">${stats.stress}/100</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span>🤝 Trust in You</span>
                        <span class="text-blue-600 font-bold">${stats.trust}/100</span>
                    </div>
                </div>

                <button onclick="handleReplay()"
                    class="mt-6 w-full bg-slate-900 text-white rounded-xl py-4 font-bold hover:bg-slate-800 transition shadow-lg active:scale-95">
                    🔄 Replay Kevin's Life
                </button>
            `;

            setTimeout(() => {
                chatBox.appendChild(result);
                scrollToBottom();
            }, 1000);
        }

        function handleReplay() {
            gtag('event', 'restart_game', { 
                'event_category': 'Engagement',
                'replayed_from': currentEndingType
            });
            setTimeout(() => { location.reload(); }, 250);
        }

        window.onload = () => {
            gtag('event', 'game_start', { 'event_category': 'Engagement' });
            runStage();
        };
    </script>
</body>
</html>
