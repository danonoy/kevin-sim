<!DOCTYPE html>
<html lang="en">
<head>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-TBP17V9M20');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kevin Life Sim Beta</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#dfe4ea;
}

.chat-scroll::-webkit-scrollbar{
    display:none;
}

.fade{
    animation:fade .3s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0px);
    }
}

.typing span{
    width:8px;
    height:8px;
    background:#999;
    border-radius:999px;
    display:inline-block;
    animation:bounce 1.2s infinite;
}

.typing span:nth-child(2){
    animation-delay:.2s;
}

.typing span:nth-child(3){
    animation-delay:.4s;
}

@keyframes bounce{
    0%,80%,100%{
        transform:scale(.5);
        opacity:.5;
    }

    40%{
        transform:scale(1);
        opacity:1;
    }
}

</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md h-[90vh] bg-white rounded-[32px] overflow-hidden shadow-2xl border-8 border-black flex flex-col">

    <!-- header -->
    <div class="bg-white border-b p-4 flex justify-between items-center">

        <div class="flex items-center gap-3">

            <div id="avatar"
                class="w-12 h-12 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold text-xl">
                K
            </div>

            <div>
                <div class="font-bold">
                    Kevin (25)
                </div>

                <div class="text-xs text-gray-500">
                    Salary $4,200 ・ Savings $3,000
                </div>
            </div>

        </div>

        <div class="text-right text-xs">
            <div>Replay</div>
            <div id="replayCount" class="font-black text-lg">0</div>
        </div>

    </div>

    <!-- stats -->
    <div class="bg-gray-100 p-2 flex gap-2 text-xs border-b">

        <div class="bg-white px-3 py-1 rounded-full shadow">
            💸 Debt: <span id="debtText">0</span>
        </div>

        <div class="bg-white px-3 py-1 rounded-full shadow">
            😵 Stress: <span id="stressText">0</span>
        </div>

        <div class="bg-white px-3 py-1 rounded-full shadow">
            🤝 Trust: <span id="trustText">50</span>
        </div>

    </div>

    <!-- chat -->
    <div id="chat"
        class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 bg-[#f7f7f7] chat-scroll">
    </div>

    <!-- choices -->
    <div id="choices"
        class="border-t bg-white p-3 flex flex-col gap-2">
    </div>

</div>

<script>

const chat = document.getElementById('chat')
const choices = document.getElementById('choices')

const debtText = document.getElementById('debtText')
const stressText = document.getElementById('stressText')
const trustText = document.getElementById('trustText')

let debt = 0
let stress = 0
let trust = 50

let currentStage = 0

// replay count
let replay = parseInt(localStorage.getItem('kevinReplay') || '0')
replay++

localStorage.setItem('kevinReplay', replay)

document.getElementById('replayCount').innerText = replay

// events
const events = [

{
    message:
    'Bro... I seriously can’t keep driving this crappy car 😩 I wanna finance a Model Y.',

    choices:[
        {
            text:'You literally cannot afford it.',
            rebel:true,
            reply:'Yeah but I’m tired of looking broke... I signed the papers anyway.',
            debt:35000,
            stress:20,
            trust:5
        },

        {
            text:'At least save up a down payment first.',
            rebel:false,
            reply:'Ugh... fine. I’ll wait a bit.',
            debt:5000,
            stress:5,
            trust:10
        },

        {
            text:'Do it. You’re only young once.',
            rebel:false,
            reply:'HAHA finally someone gets it 😎',
            debt:45000,
            stress:30,
            trust:-5
        }
    ]
},

{
    message:
    'My friend made 3x on crypto 🚀 I kinda wanna put all my savings into it.',

    choices:[
        {
            text:'That’s literally your emergency fund.',
            rebel:true,
            reply:'You’re way too conservative.',
            debt:10000,
            stress:25,
            trust:8
        },

        {
            text:'Only use like 10% max.',
            rebel:false,
            reply:'Alright... that’s probably smarter.',
            debt:1000,
            stress:5,
            trust:10
        },

        {
            text:'FULL SEND. Go all in.',
            rebel:false,
            reply:'FINANCIAL FREEDOM 🔥',
            debt:25000,
            stress:40,
            trust:-5
        }
    ]
}

]

// update stats
function updateStats(){

    debtText.innerText = '$' + debt
    stressText.innerText = stress
    trustText.innerText = trust

    const avatar = document.getElementById('avatar')

    if(stress > 50){
        avatar.className =
        'w-12 h-12 rounded-full bg-red-500 text-white flex items-center justify-center font-bold text-xl'
    }
    else{
        avatar.className =
        'w-12 h-12 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold text-xl'
    }
}

// add message
function addMessage(text, side='left'){

    const div = document.createElement('div')

    div.className =
    `max-w-[80%] px-4 py-3 rounded-2xl shadow fade text-sm leading-relaxed
    ${side === 'left'
        ? 'bg-white self-start'
        : 'bg-blue-500 text-white self-end'
    }`

    div.innerHTML = text

    chat.appendChild(div)

    chat.scrollTop = chat.scrollHeight
}

// typing animation
function showTyping(callback){

    const typing = document.createElement('div')

    typing.className =
    'bg-white self-start px-4 py-3 rounded-2xl shadow fade typing'

    typing.innerHTML =
    `
    <div class="flex gap-1">
        <span></span>
        <span></span>
        <span></span>
    </div>
    `

    chat.appendChild(typing)

    chat.scrollTop = chat.scrollHeight

    setTimeout(() => {

        typing.remove()

        callback()

    }, 1000)
}

// next stage
function nextStage(){

    if(currentStage >= events.length){
        endGame()
        return
    }

    const event = events[currentStage]

    showTyping(() => {

        addMessage(event.message)

        renderChoices(event)

    })
}

// render choices
function renderChoices(event){

    choices.innerHTML = ''

    event.choices.forEach(choice => {

        const btn = document.createElement('button')

        btn.className =
        'bg-gray-100 hover:bg-blue-100 transition p-3 rounded-xl text-left text-sm font-semibold'

        btn.innerText = choice.text

        btn.onclick = () => choose(choice)

        choices.appendChild(btn)

    })
}

// choose
function choose(choice){

    choices.innerHTML = ''

    addMessage(choice.text, 'right')

    setTimeout(() => {

        showTyping(() => {

            addMessage(choice.reply)

            debt += choice.debt
            stress += choice.stress
            trust += choice.trust

            updateStats()

            setTimeout(() => {

                const jump = document.createElement('div')

                jump.className =
                'text-center text-xs text-gray-500 fade'

                jump.innerHTML =
                choice.rebel
                ? '⏳ Six months later... things started falling apart.'
                : '⏳ Six months later... your advice actually helped.'

                chat.appendChild(jump)

                chat.scrollTop = chat.scrollHeight

                currentStage++

                setTimeout(() => {

                    nextStage()

                }, 1500)

            }, 1200)

        })

    }, 500)
}

// end game
function endGame(){

    choices.innerHTML = ''

    let resultHTML = ''

    if(debt > 50000){

        resultHTML =
        `
        <div class="text-5xl mb-4">💀</div>

        <div class="text-2xl font-black mb-3">
            Kevin Crashed
        </div>

        <div class="text-gray-600 leading-relaxed">
            He started ignoring bills.
            Ignoring friends.
            And eventually ignoring reality.
        </div>
        `
    }

    else{

        resultHTML =
        `
        <div class="text-5xl mb-4">🛟</div>

        <div class="text-2xl font-black mb-3">
            You Almost Saved Him
        </div>

        <div class="text-gray-600 leading-relaxed">
            Kevin is still impulsive.
            But at least now he asks for advice first.
        </div>
        `
    }

    const result = document.createElement('div')

    result.className =
    'bg-white rounded-3xl p-6 shadow-lg fade'

    result.innerHTML =
    `
    <div class="text-center">

        ${resultHTML}

        <div class="mt-6 bg-gray-100 rounded-2xl p-4 text-sm text-left space-y-2">

            <div>💸 Final Debt: $${debt}</div>

            <div>😵 Stress Level: ${stress}</div>

            <div>🤝 Trust In You: ${trust}</div>

        </div>

        <button
            onclick="location.reload()"
            class="mt-6 w-full bg-black text-white py-4 rounded-xl font-bold">
            🔄 Replay Kevin's Life
        </button>

    </div>
    `

    chat.appendChild(result)

    chat.scrollTop = chat.scrollHeight
}

// start
updateStats()
nextStage()

</script>

</body>
</html>
