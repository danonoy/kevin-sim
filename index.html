<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kevin Simulator Beta</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TBP17V9M20"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-TBP17V9M20');
</script>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:600px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

h1,h2{
    text-align:center;
}

#message{
    font-size:20px;
    line-height:1.5;
    margin-bottom:25px;
}

.choice{
    width:100%;
    padding:15px;
    margin-bottom:10px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.choice:hover{
    opacity:.9;
}

.stats{
    background:#f3f4f6;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}

.restart-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
    cursor:pointer;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<div id="game">

<h1>Kevin Simulator</h1>

<p id="message"></p>

<div id="choices"></div>

</div>

<div id="ending" style="display:none;">

<h2 id="endingTitle"></h2>

<div class="stats" id="endingStats"></div>

<button class="restart-btn" onclick="restartGame()">
Play Again
</button>

</div>

</div>

<script>

const scenarios = [

{
id:"tesla",
emotion:3,
message:
"Kevin (25): Everyone from college drives nice cars now. I want a Tesla Model Y. I can finance it for 84 months.",

choices:[
"Don't buy it.",
"Save a down payment first.",
"Buy it now."
],

effect:[-1,0,2]
},

{
id:"crypto",
emotion:4,
message:
"Kevin: My friend made 300% on a crypto coin. I want to put my entire emergency fund into it.",

choices:[
"Absolutely not.",
"Invest only 10%.",
"Go all in."
],

effect:[-1,0,2]
},

{
id:"girlfriend",
emotion:5,
message:
"Kevin: My girlfriend wants us to move in together after only 3 months.",

choices:[
"Too soon.",
"Wait and see.",
"Move in immediately."
],

effect:[-1,0,1]
},

{
id:"friendloan",
emotion:4,
message:
"Kevin: My friend needs $5,000 for his startup. He says we'll be rich.",

choices:[
"Say no.",
"Ask for a business plan.",
"Give him the money."
],

effect:[-1,0,2]
},

{
id:"career",
emotion:5,
message:
"Kevin: I hate my job. I'm thinking about quitting tomorrow to become a full-time streamer.",

choices:[
"Don't quit.",
"Build income first.",
"Follow your dream immediately."
],

effect:[-1,0,2]
}

];

let currentScenario = 0;
let debt = 0;
let stress = 0;
let emotionalScore = 0;
let scenarioStartTime = 0;
let ending = "";

function track(eventName,data={}){

gtag('event',eventName,data);

console.log(eventName,data);

}

function startGame(){

track('game_start');

showScenario();

}

function showScenario(){

const scenario = scenarios[currentScenario];

scenarioStartTime = Date.now();

track('scenario_view',{
scenario_id:scenario.id
});

document.getElementById('message').innerHTML =
scenario.message;

const choicesDiv =
document.getElementById('choices');

choicesDiv.innerHTML = '';

scenario.choices.forEach((choice,index)=>{

const button =
document.createElement('button');

button.className='choice';

button.innerText=choice;

button.onclick=()=>makeChoice(index);

choicesDiv.appendChild(button);

});

}

function makeChoice(choiceIndex){

const scenario = scenarios[currentScenario];

const decisionTime =
Date.now()-scenarioStartTime;

track('choice_made',{

scenario_id:scenario.id,

choice_id:choiceIndex,

decision_time_ms:decisionTime

});

emotionalScore += scenario.emotion;

const impact = scenario.effect[choiceIndex];

if(impact > 0){

debt += impact * 5000;
stress += impact * 20;

}

if(impact < 0){

stress = Math.max(0, stress - 10);

}

currentScenario++;

if(currentScenario < scenarios.length){

showScenario();

}else{

endGame();

}

}

function endGame(){

if(debt < 5000 && stress < 30){

ending="stable";

}

else if(debt < 15000){

ending="debt_spiral";

}

else{

ending="financial_disaster";

}

track('ending_reached',{

ending:ending,

debt:debt,

stress:stress,

emotional_score:emotionalScore

});

document.getElementById('game').style.display='none';

document.getElementById('ending').style.display='block';

document.getElementById('endingTitle').innerHTML =
ending.replace('_',' ').toUpperCase();

document.getElementById('endingStats').innerHTML =

`
<strong>Debt:</strong> $${debt}<br><br>
<strong>Stress:</strong> ${stress}<br><br>
<strong>Emotional Score:</strong> ${emotionalScore}
`;

}

function restartGame(){

track('restart_game',{
ending:ending
});

location.reload();

}

startGame();

</script>

</body>
</html>
