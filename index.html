<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kevin Life Simulator Beta</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TBP17V9M20"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag(){
      dataLayer.push(arguments);
    }

    gtag('js', new Date());
    gtag('config', 'G-TBP17V9M20');
  </script>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#d1d5db;
    }

    .bubble{
      padding:12px 16px;
      border-radius:18px;
      max-width:80%;
      margin-bottom:12px;
      line-height:1.5;
      animation:fade .25s ease;
    }

    .kevin{
      background:#f3f4f6;
      color:#111827;
      align-self:flex-start;
    }

    .user{
      background:#2563eb;
      color:white;
      align-self:flex-end;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(6px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

  <div class="w-full max-w-md h-[820px] bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col">

    <!-- Header -->
    <div class="bg-gray-100 border-b p-4">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold text-xl">
          K
        </div>

        <div>
          <h1 class="font-bold text-gray-800">
            Kevin (25)
          </h1>

          <p class="text-sm text-gray-500">
            Salary: $4,200 / Savings: $3,000
          </p>
        </div>
      </div>
    </div>

    <!-- Chat -->
    <div
      id="chat"
      class="flex-1 overflow-y-auto p-4 flex flex-col"
    ></div>

    <!-- Status -->
    <div class="border-t bg-gray-50 p-3 text-sm">
      <div class="flex justify-between mb-1">
        <span>Debt</span>
        <span id="debtText">$0</span>
      </div>

      <div class="flex justify-between">
        <span>Stress</span>
        <span id="stressText">0%</span>
      </div>
    </div>

    <!-- Choices -->
    <div
      id="choicesDiv"
      class="p-3 border-t bg-white space-y-2"
    ></div>

  </div>

<script>

const chat = document.getElementById("chat");
const choicesDiv = document.getElementById("choicesDiv");
const debtText = document.getElementById("debtText");
const stressText = document.getElementById("stressText");

let debt = 0;
let stress = 0;
let currentEvent = 0;

const story = [

  // EVENT 1
  {
    title: "Tesla Loan",

    message:
      "Bro... I really wanna buy a Model Y before the reunion. Everyone else upgraded already 😭. The dealer approved me for an 84-month loan. Monthly payment is only $640. I think I can handle it.",

    choices: [
      {
        text: "You absolutely cannot afford this car.",
        reply:
          "Come on man... I'm still young. I don't wanna look broke forever 😩",
        debt: 18000,
        stress: 15
      },

      {
        text: "At least save a down payment first.",
        reply:
          "That'll take forever though 😭 I already signed the papers...",
        debt: 14000,
        stress: 10
      },

      {
        text: "Do it. Life is short.",
        reply:
          "LET'S GOOOO 😎 I even upgraded the wheels too.",
        debt: 25000,
        stress: 20
      }
    ]
  },

  // EVENT 2
  {
    title: "Crypto Disaster",

    message:
      "My friend says this crypto coin is gonna 10x soon 🚀. I'm thinking about putting my entire emergency fund into it.",

    choices: [
      {
        text: "Never gamble your emergency fund.",
        reply:
          "You're too conservative 😒 scared money never wins.",
        debt: 6000,
        stress: 20
      },

      {
        text: "Only invest money you can lose.",
        reply:
          "If I only put in a little, I won't get rich though 😭",
        debt: 9000,
        stress: 25
      },

      {
        text: "Go all in.",
        reply:
          "BRO THIS IS OUR CHANCE 🔥🔥🔥",
        debt: 18000,
        stress: 35
      }
    ]
  },

  // EVENT 3
  {
    title: "Buy Now Pay Later",

    message:
      "I found this luxury watch online. It's only $79/month with installments. That's basically free, right? 👀",

    choices: [
      {
        text: "Monthly payments add up fast.",
        reply:
          "But it's ONLY 79 bucks 😭",
        debt: 4000,
        stress: 10
      },

      {
        text: "You don't need this watch.",
        reply:
          "You don't understand the vibe 😩",
        debt: 7000,
        stress: 15
      },

      {
        text: "Treat yourself king.",
        reply:
          "FINALLY someone gets it 😎",
        debt: 12000,
        stress: 20
      }
    ]
  },

  // NEW EVENT 4
  {
    title: "Friend's Startup",

    message:
      "My friend wants me to invest $5,000 into his new business. He says if I don't support him, I'm not a real friend 😓",

    choices: [
      {
        text: "Never invest under emotional pressure.",
        reply:
          "Yeah but I feel guilty saying no 😭",
        debt: 5000,
        stress: 15
      },

      {
        text: "Ask to see financial projections first.",
        reply:
          "That feels awkward though...",
        debt: 3000,
        stress: 10
      },

      {
        text: "Support your friend. Go for it.",
        reply:
          "I knew you'd understand 🥺",
        debt: 15000,
        stress: 25
      }
    ]
  }

];

function scrollBottom(){
  chat.scrollTop = chat.scrollHeight;
}

function addKevinMessage(text){

  chat.innerHTML += `
    <div class="bubble kevin">
      ${text}
    </div>
  `;

  scrollBottom();
}

function addUserMessage(text){

  chat.innerHTML += `
    <div class="bubble user">
      ${text}
    </div>
  `;

  scrollBottom();
}

function updateStats(){

  debtText.innerText = `$${debt.toLocaleString()}`;
  stressText.innerText = `${stress}%`;

}

function nextEvent(){

  if(currentEvent >= story.length){
    endGame();
    return;
  }

  const event = story[currentEvent];

  // GA4 EVENT VIEW
  gtag('event', 'event_view', {
    event_name: event.title
  });

  addKevinMessage(event.message);

  choicesDiv.innerHTML = "";

  event.choices.forEach(choice => {

    const btn = document.createElement("button");

    btn.className =
      "w-full bg-gray-100 hover:bg-blue-100 transition p-3 rounded-xl text-left";

    btn.innerText = choice.text;

    btn.onclick = () => {

      // GA4 CHOICE SELECTED
      gtag('event', 'choice_selected', {
        event_name: event.title,
        choice: choice.text
      });

      addUserMessage(choice.text);

      setTimeout(() => {

        addKevinMessage(choice.reply);

        debt += choice.debt;
        stress += choice.stress;

        updateStats();

        currentEvent++;

        choicesDiv.innerHTML = "";

        setTimeout(() => {
          nextEvent();
        }, 1800);

      }, 900);

    };

    choicesDiv.appendChild(btn);

  });

}

function endGame(){

  // GA4 ENDING REACHED
  gtag('event', 'ending_reached', {
    debt: debt,
    stress: stress
  });

  let ending = "";

  if(debt >= 45000){

    ending =
      "Kevin is drowning in debt. Collection agencies are calling daily. His financial life is collapsing.";

  } else if(stress >= 70){

    ending =
      "Kevin developed severe anxiety from financial pressure. He can barely sleep anymore.";

  } else {

    ending =
      "Kevin barely survived adulthood... but his financial future still looks unstable.";

  }

  chat.innerHTML += `
    <div class="bubble kevin">
      ${ending}
    </div>
  `;

  choicesDiv.innerHTML = `
    <button
      onclick="restartGame()"
      class="w-full bg-black text-white p-4 rounded-xl font-bold"
    >
      🔄 Try To Save Kevin Again
    </button>
  `;

  scrollBottom();

}

function restartGame(){

  // GA4 REPLAY CLICKED
  gtag('event', 'replay_clicked');

  location.reload();

}

function startGame(){

  // GA4 GAME START
  gtag('event', 'game_start');

  addKevinMessage(
    "Hey... I think my life might be getting out of control lately 😅"
  );

  setTimeout(() => {
    nextEvent();
  }, 1200);

}

startGame();

</script>

</body>
</html>
