<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin Life Simulator Beta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TBP17V9M20"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TBP17V9M20');
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #111827; }
        ::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat-bubble-k { background-color: #f3f4f6; color: #1f2937; border-bottom-left-radius: 4px; }
        .chat-bubble-u { background-color: #3b82f6; color: #ffffff; border-bottom-right-radius: 4px; }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen py-4 sm:py-8">

    <div class="w-full max-w-sm h-[800px] max-h-screen bg-white shadow-2xl relative flex flex-col sm:rounded-[2.5rem] border-[8px] border-gray-900 overflow-hidden">
        
        <div class="bg-gray-100/90 backdrop-blur-sm border-b border-gray-200 px-4 py-3 flex items-center gap-3 z-10 shrink-0">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-gray-700 to-gray-900 flex items-center justify-center text-white font-bold text-lg shadow-inner">K</div>
            <div>
                <h2 class="font-bold text-gray-800 leading-tight">Kevin</h2>
                <p class="text-xs text-green-600 font-bold">Online</p>
            </div>
        </div>

        <div id="chat-box" class="flex-1 p-4 overflow-y-auto flex flex-col gap-4 bg-slate-50">
            </div>

        <div id="choice-panel" class="bg-white border-t border-gray-200 p-3 hidden slide-up shadow-[0_-4px_15px_rgba(0,0,0,0.05)] z-20 shrink-0">
            <p class="text-[10px] font-bold text-gray-400 text-center uppercase tracking-widest mb-2">Give Advice</p>
            <div id="choices-container" class="space-y-2 max-h-[35vh] overflow-y-auto pb-1">
                </div>
        </div>

        <div id="time-jump" class="absolute inset-0 bg-slate-900/95 z-30 flex flex-col items-center justify-center hidden fade-in text-white">
            <p class="text-gray-400 text-sm mb-2" id="jump-subtitle">3 Months Later...</p>
            <h2 class="text-2xl font-black tracking-widest text-center px-4" id="jump-title">Life is Good</h2>
        </div>

    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const choicePanel = document.getElementById('choice-panel');
        const choicesContainer = document.getElementById('choices-container');
        const timeJump = document.getElementById('time-jump');
        
        let stats = { trust: 50, stress: 50, debt: 0 };
        let currentStage = 0;
        let scenarioStartTime = 0; // 用來計算思考時間
        let currentEndingType = ''; // 紀錄最終結局狀態

        const storyEvents = [
            {
                scenarioName: "The Car (Status Anxiety)",
                setup: [
                    "Work is stressing me out so much lately. My boss is a nightmare.",
                    "Went to a college reunion yesterday. Everyone's doing so well. Jack literally pulled up in a Porsche.",
                    "I know I just started my career, but I feel like such a loser at these things...",
                    "I'm thinking of financing a Model Y. 84-month loan, 0 down. It's only like $600/mo. I think I can squeeze it into my budget."
                ],
                choices: [
                    {
                        text: "Are you insane? You make $4,200/mo. The loan + insurance will drown you. Keep driving your old car!",
                        trustEffect: -20, stressEffect: 30, debtEffect: 85000,
                        reply: "You always just lecture me. You don't understand what it feels like to be looked down on. Whatever, I already signed the papers.",
                        jumpTitle: "Feeling Like a Boss", jumpSub: "2 Months Later",
                        consequence: "Got the car. Money is super tight by the end of the month, but taking girls out in it feels amazing. Worth it."
                    },
                    {
                        text: "I get wanting to prove yourself, but 100% financing is a trap. Save 20% for a down payment first?",
                        trustEffect: 15, stressEffect: -10, debtEffect: 15000,
                        reply: "Saving 20% would take forever... But you're right, it's too tight. I backed out and got a used Golf instead.",
                        jumpTitle: "A Modest Compromise", jumpSub: "2 Months Later",
                        consequence: "The used car is fine. Not as flashy, but it gets me around and I'm not stressing over the payments."
                    },
                    {
                        text: "You only live once! Do it. You gotta look the part to get the part. Make them jealous!",
                        trustEffect: 20, stressEffect: 10, debtEffect: 90000,
                        reply: "Haha I knew you'd get it! I even put a stereo upgrade on my credit card. It's sick! 😎",
                        jumpTitle: "Peak Euphoria", jumpSub: "2 Months Later",
                        consequence: "The new ride is incredible! Jack was speechless. Finally feel like I'm doing something with my life."
                    }
                ]
            },
            {
                scenarioName: "Crypto FOMO",
                setup: [
                    "Hey, gotta tell you something.",
                    "Jack tipped me off on this new crypto coin. It literally tripled in a month.",
                    "I'm thinking of taking my $3,000 emergency fund and going ALL IN. In and out in a month. Free money."
                ],
                choices: [
                    {
                        text: "That's your safety net! Don't touch it. 9 out of 10 of those are pump-and-dump scams.",
                        trustEffect: 0, 
                        getReply: () => {
                            if (stats.trust >= 60) {
                                stats.stress -= 10;
                                return "Ugh... fine. Since you're usually right about this stuff, I'll pass. I'll just watch them get rich.";
                            } else {
                                stats.debt += 10000;
                                stats.stress += 40;
                                return "You're too scared of everything, that's why you're stuck in the rat race. I'm not missing this. I went all in and put some on a credit card.";
                            }
                        },
                        jumpTitle: "The Gears of Fate", jumpSub: "6 Months Later"
                    },
                    {
                        text: "If you really have FOMO, just put in $500. DO NOT touch the rest of your savings.",
                        trustEffect: 10,
                        getReply: () => {
                            stats.stress += 10;
                            return "Fair enough. Let's meet in the middle. I'll just put in a little to test the waters.";
                        },
                        jumpTitle: "The Gears of Fate", jumpSub: "6 Months Later"
                    }
                ]
            },
            {
                scenarioName: "BNPL Trap (Lifestyle Creep)",
                setup: [
                    "So, I found this gorgeous designer watch. It's normally $4,500.",
                    "But the store has this zero-interest Buy Now Pay Later plan. It's literally only $125 a month!",
                    "That's basically less than my weekly coffee and dining out. It's a no-brainer to look successful at work, right?"
                ],
                choices: [
                    {
                        text: "It's a trap. Splitting it into small payments doesn't mean you can afford it. Do not buy it.",
                        trustEffect: -10, stressEffect: 20,
                        getReply: () => {
                            if (stats.trust >= 50) {
                                return "Alright, alright, you're ruining my fun but I'll pass. I guess I'll just stick to my old Casio. 🙄";
                            } else {
                                stats.debt += 15000; 
                                stats.stress += 30;
                                return "Man, you have no style. It's literally $125. I bought it. My wrist looks wealthy now.";
                            }
                        },
                        jumpTitle: "The Illusion of Wealth", jumpSub: "5 Months Later"
                    },
                    {
                        text: "If you want it that badly, you have to cut out dining out completely until it's paid off. Deal?",
                        trustEffect: 15, stressEffect: 10, debtEffect: 2500,
                        getReply: () => {
                            return "Deal! I'll pack my lunch for a few months. Bought the watch, it's worth the sacrifice.";
                        },
                        jumpTitle: "The Illusion of Wealth", jumpSub: "5 Months Later"
                    },
                    {
                        text: "Go for it! Looking successful actually helps you get promotions. Fake it till you make it.",
                        trustEffect: 25, stressEffect: 5, debtEffect: 18000,
                        getReply: () => {
                            return "Exactly! Investment in my personal brand. Picked it up today, feels amazing!";
                        },
                        jumpTitle: "The Illusion of Wealth", jumpSub: "5 Months Later"
                    }
                ]
            }
        ];

        function scrollToBottom() {
            setTimeout(() => {
                chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        function showTyping(callback) {
            const id = 'typing-' + Date.now();
            chatBox.insertAdjacentHTML('beforeend', `
                <div id="${id}" class="flex gap-2 w-max max-w-[75%] px-4 py-3 rounded-2xl chat-bubble-k slide-up items-center">
                    <div class="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-gray-500 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-gray-500 rounded-full typing-dot"></div>
                </div>
            `);
            scrollToBottom();
            setTimeout(() => {
                const el = document.getElementById(id);
                if(el) el.remove();
                callback();
            }, 1500);
        }

        function addKevinMessage(text) {
            chatBox.insertAdjacentHTML('beforeend', `
                <div class="flex gap-2 w-max max-w-[85%] px-4 py-3 rounded-2xl chat-bubble-k slide-up text-[15px] leading-relaxed shadow-sm">
                    ${text}
                </div>
            `);
            scrollToBottom();
        }

        function addUserMessage(text) {
            chatBox.insertAdjacentHTML('beforeend', `
                <div class="flex gap-2 w-max max-w-[85%] px-4 py-3 rounded-2xl chat-bubble-u slide-up text-[15px] leading-relaxed shadow-sm self-end">
                    ${text}
                </div>
            `);
            scrollToBottom();
        }

        function sendMessageSequence(messages, callback) {
            let i = 0;
            function sendNext() {
                if (i < messages.length) {
                    showTyping(() => {
                        addKevinMessage(messages[i]);
                        i++;
                        setTimeout(sendNext, 1000); 
                    });
                } else {
                    if (callback) callback();
                }
            }
            sendNext();
        }

        function promptChoices(stage) {
            choicesContainer.innerHTML = '';
            const event = storyEvents[stage];
            
            event.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'w-full bg-white hover:bg-gray-50 text-gray-800 font-medium py-3.5 px-4 rounded-xl border border-gray-200 text-left text-[14px] leading-snug transition shadow-sm';
                btn.innerText = choice.text;
                btn.onclick = () => handleChoice(choice, event);
                choicesContainer.appendChild(btn);
            });
            
            choicePanel.classList.remove('hidden');
            scrollToBottom(); 
            
            // 開始計算思考時間
            scenarioStartTime = Date.now();
        }

        function handleChoice(choice, event) {
            choicePanel.classList.add('hidden');
            addUserMessage(choice.text);
            
            // 計算精準的思考時間 (秒)
            let thinkingTimeSeconds = Math.round((Date.now() - scenarioStartTime) / 1000);
            
            gtag('event', 'choice_made', {
                'event_category': 'Decision',
                'scenario_name': event.scenarioName,
                'choice_text': choice.text,
                'thinking_time_sec': thinkingTimeSeconds
            });
            
            if(choice.trustEffect) stats.trust += choice.trustEffect;
            if(choice.stressEffect) stats.stress += choice.stressEffect;
            if(choice.debtEffect) stats.debt += choice.debtEffect;

            const finalReply = choice.getReply ? choice.getReply() : choice.reply;

            setTimeout(() => {
                showTyping(() => {
                    addKevinMessage(finalReply);
                    setTimeout(() => {
                        triggerTimeJump(choice.jumpTitle, choice.jumpSub, choice.consequence);
                    }, 2500);
                });
            }, 800);
        }

        function triggerTimeJump(title, subtitle, consequence) {
            document.getElementById('jump-title').innerText = title;
            document.getElementById('jump-subtitle').innerText = subtitle;
            timeJump.classList.remove('hidden');
            
            setTimeout(() => {
                timeJump.classList.add('hidden');
                setTimeout(() => {
                    if(consequence) {
                        showTyping(() => {
                            addKevinMessage(consequence);
                            setTimeout(() => {
                                currentStage++;
                                if(currentStage < storyEvents.length) {
                                    runStage();
                                } else {
                                    triggerEndingDialogue();
                                }
                            }, 3500);
                        });
                    } else {
                        currentStage++;
                        if(currentStage < storyEvents.length) {
                            runStage();
                        } else {
                            triggerEndingDialogue();
                        }
                    }
                }, 1000);
            }, 3000);
        }

        function runStage() {
            gtag('event', 'scenario_reached', {
                'event_category': 'Progress',
                'scenario_name': storyEvents[currentStage].scenarioName
            });

            setTimeout(() => {
                sendMessageSequence(storyEvents[currentStage].setup, () => {
                    setTimeout(() => promptChoices(currentStage), 500);
                });
            }, 1000);
        }

        function triggerEndingDialogue() {
            setTimeout(() => {
                let endingMsg = [];
                if (stats.debt > 50000) {
                    currentEndingType = 'ending_crashed';
                    endingMsg = [
                        "Hey man, are you there?",
                        "I am completely drowning.",
                        "The interest on the car and credit cards built up way faster than I thought. I can barely pay the minimums.",
                        "Now the tech market crashed, my company laid me off, and my credit score just tanked.",
                        "They're repossessing the car tomorrow. I don't know what to do..."
                    ];
                } else if (stats.stress > 60) {
                    currentEndingType = 'ending_struggling';
                    endingMsg = [
                        "Hey...",
                        "Things got really tight this month.",
                        "Between the payments and high cost of living, I have zero savings left.",
                        "I'm constantly stressed out about making rent. Feels like I'm one mistake away from ruin."
                    ];
                } else {
                    currentEndingType = 'ending_saved';
                    endingMsg = [
                        "Hey!",
                        "Crazy year. A lot of my friends got laid off and went into debt.",
                        "Honestly, thank God I listened to some of your warnings and avoided those heavy payment plans.",
                        "I don't have a luxury lifestyle, but I can sleep peacefully at night."
                    ];
                }

                sendMessageSequence(endingMsg, () => {
                    setTimeout(() => {
                        endGame();
                    }, 2000);
                });
            }, 2000);
        }

        function endGame() {
            choicePanel.classList.add('hidden');
            choicesContainer.innerHTML = '';

            let endingHtml = '';

            if (currentEndingType === 'ending_crashed') {
                endingHtml = `
                    <div class="text-center space-y-4">
                        <div class="text-6xl mb-4">💀</div>
                        <div class="text-2xl font-black text-gray-800 tracking-tight">Kevin Crashed.</div>
                        <div class="text-gray-500 text-sm leading-relaxed">
                            He completely ran out of cash flow.<br>He has zero financial resilience left.<br>And he's ghosting everyone's texts.
                        </div>
                    </div>
                `;
            } else if (currentEndingType === 'ending_saved') {
                endingHtml = `
                    <div class="text-center space-y-4">
                        <div class="text-6xl mb-4">🛟</div>
                        <div class="text-2xl font-black text-gray-800 tracking-tight">You Saved Him.</div>
                        <div class="text-gray-500 text-sm leading-relaxed">
                            Kevin still has impulsive urges.<br>But he officially trusts you enough to ask for advice before making big financial moves.
                        </div>
                    </div>
                `;
            } else {
                endingHtml = `
                    <div class="text-center space-y-4">
                        <div class="text-6xl mb-4">😶</div>
                        <div class="text-2xl font-black text-gray-800 tracking-tight">Kevin is Surviving.</div>
                        <div class="text-gray-500 text-sm leading-relaxed">
                            His life isn't totally destroyed,<br>but he's living paycheck to paycheck and hasn't truly grown up yet.
                        </div>
                    </div>
                `;
            }

            // 發送精準的結局事件
            gtag('event', currentEndingType, {
                'event_category': 'Completion',
                'final_debt': stats.debt,
                'final_stress': stats.stress,
                'final_trust': stats.trust
            });

            const result = document.createElement('div');
            result.className = 'bg-white rounded-3xl p-6 slide-up shadow-xl mt-4 mb-6 border border-gray-100 mx-2 relative z-40';
            
            const formattedDebt = new Intl.NumberFormat('en-US').format(stats.debt);

            result.innerHTML = `
                ${endingHtml}
                <div class="mt-8 bg-gray-50 rounded-2xl p-4 text-[13px] space-y-3 font-medium text-gray-600 border border-gray-100">
                    <div class="flex justify-between items-center">
                        <span>💸 Final Debt</span>
                        <span class="text-red-500 font-bold text-base">$${formattedDebt}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span>😵 Stress Level</span>
                        <span class="text-gray-800 font-bold">${stats.stress}/100</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span>🤝 Trust in You</span>
                        <span class="text-blue-600 font-bold">${stats.trust}/100</span>
                    </div>
                </div>

                <button onclick="handleReplay()"
                    class="mt-6 w-full bg-slate-900 text-white rounded-xl py-4 font-bold hover:bg-slate-800 transition shadow-lg active:scale-95">
                    🔄 Replay Kevin's Life
                </button>
            `;

            setTimeout(() => {
                chatBox.appendChild(result);
                scrollToBottom();
            }, 1000);
        }

        function handleReplay() {
            // 紀錄玩家是因為哪個結局而不甘心重玩的
            gtag('event', 'restart_game', { 
                'event_category': 'Engagement',
                'replayed_from': currentEndingType
            });
            setTimeout(() => { location.reload(); }, 250);
        }

        window.onload = () => {
            gtag('event', 'game_start', { 'event_category': 'Engagement' });
            runStage();
        };
    </script>
</body>
</html>
